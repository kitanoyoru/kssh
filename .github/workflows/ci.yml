name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Swift version
        run: swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  lint:
    name: Lint (swift-format)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Lint
        run: xcrun swift-format lint --recursive --strict Sources Tests
